<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Sampling Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        get,
        push,
        onValue
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    
      const firebaseConfig = {
        apiKey: "AIzaSyBG7_rtekdJ3op-tlTUcHk_eN2RqyCAL9E",
        authDomain: "gen-lang-client-0781969916.firebaseapp.com",
        databaseURL: "https://gen-lang-client-0781969916-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "gen-lang-client-0781969916",
        storageBucket: "gen-lang-client-0781969916.firebasestorage.app",
        messagingSenderId: "522142351405",
        appId: "1:522142351405:web:5f6dc7b4c962cd41e0b8a4"
      };
    
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
    
      window.firebaseDb = { db, ref, set, get, push, onValue };
      window.firebaseReady = true;
    
      console.log("Firebase ready:", window.firebaseDb);
    </script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UTILS ---
        const calcAge = (dateStr) => {
            if (!dateStr) return 0;
            const birthDate = new Date(dateStr);
            const today = new Date();
            const diffMs = today - birthDate;
            const age = diffMs / (1000 * 60 * 60 * 24 * 365.25);
            return parseFloat(age.toFixed(2));
        };

        const getTodayStr = () => new Date().toISOString().split('T')[0];

        function App() {
            const [view, setView] = useState('landing'); 
            const [roomCode, setRoomCode] = useState('');
            const [population, setPopulation] = useState([]); 
            const [sampleIds, setSampleIds] = useState([]); 
            const [drawSize, setDrawSize] = useState(1);
            const [error, setError] = useState('');
            
            const resetToLanding = () => {
              setView('landing');
              setRoomCode('');
              setPopulation([]);
              setSampleIds([]);
              setDrawSize(1);
              setError('');
            };
            
            // Sync with LocalStorage Simulation
            useEffect(() => {
              if (!roomCode || view === 'landing' || !window.firebaseDb) return;
            
              const { db, ref, onValue } = window.firebaseDb;
              const roomRef = ref(db, `rooms/${roomCode}`);
            
              const unsubscribe = onValue(roomRef, (snapshot) => {
                if (!snapshot.exists()) {
                  alert("This session has ended.");
                  resetToLanding();
                  return;
                }
            
                const roomData = snapshot.val() || {};
                const students = roomData.students || {};
            
                const nextPopulation = Object.entries(students).map(([id, item]) => ({
                  id,
                  age: item.age
                }));
            
                setPopulation(nextPopulation);
              });
            
              return () => unsubscribe();
            }, [roomCode, view]);

            const createRoom = async () => {
              if (!window.firebaseDb) {
                alert("Firebase is not ready yet.");
                return;
              }
              
              const code = Math.floor(1000 + Math.random() * 9000).toString();
              const { db, ref, set } = window.firebaseDb;
            
              await set(ref(db, `rooms/${code}`), {
                createdAt: Date.now(),
                status: "open"
              });
            
              setRoomCode(code);
              setError('');
              setView('teacher');
            };
            
            const endSession = async () => {
              if (!window.firebaseDb || !roomCode) {
                resetToLanding();
                return;
              }
            
              const confirmed = window.confirm("End this session for everyone?");
              if (!confirmed) return;
            
              try {
                const { db, ref, set } = window.firebaseDb;
                await set(ref(db, `rooms/${roomCode}`), null);
                resetToLanding();
              } catch (err) {
                console.error("Failed to end session:", err);
                alert(`Failed to end session: ${err.message}`);
              }
            };
            
            const joinRoom = async (e) => {
              e.preventDefault();
              const code = e.target.code.value;
              const { db, ref, get } = window.firebaseDb;
            
              const snapshot = await get(ref(db, `rooms/${code}`));
              if (snapshot.exists()) {
                setRoomCode(code);
                setError('');
                setView('student');
              } else {
                setError(`Room ${code} does not exist.`);
              }
            };
            
            const submitAge = async (e) => {
              e.preventDefault();
            
              if (!window.firebaseDb) {
                alert("Firebase is not ready yet.");
                return;
              }
            
              const bdayValue = e.target.bday.value;
              const age = calcAge(bdayValue);
            
              if (new Date(bdayValue) > new Date()) {
                alert("Birthday cannot be in the future!");
                return;
              }
            
              const { db, ref, get, push } = window.firebaseDb;
            
              const roomSnapshot = await get(ref(db, `rooms/${roomCode}`));
              if (!roomSnapshot.exists()) {
                alert("This session has ended.");
                resetToLanding();
                return;
              }
            
              await push(ref(db, `rooms/${roomCode}/students`), {
                age,
                submittedAt: Date.now()
              });
            
              alert("Age submitted successfully!");
              e.target.reset();
            };

            const drawRandomSamples = () => {
                const available = population.filter(p => !sampleIds.includes(p.id));
                if (available.length === 0) return;
                const shuffled = [...available].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, Math.min(drawSize, available.length));
                const newIds = selected.map(s => s.id);
                setSampleIds(prev => [...prev, ...newIds]);
            };

            const popAvg = population.length ? (population.reduce((a, b) => a + b.age, 0) / population.length).toFixed(2) : "0.00";
            const sampleData = population.filter(p => sampleIds.includes(p.id));
            const sampleAvg = sampleData.length ? (sampleData.reduce((a, b) => a + b.age, 0) / sampleData.length).toFixed(2) : "0.00";
            const availableCount = population.length - sampleIds.length;

            if (view === 'landing') return (
                <div className="flex items-center justify-center min-h-screen">
                    <div className="bg-white p-10 rounded-3xl shadow-xl w-full max-w-sm border border-slate-200 text-center">
                        <h1 className="text-4xl font-black mb-10 text-slate-800 tracking-tighter">Age Lab</h1>
                        <button onClick={createRoom} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold hover:bg-indigo-700 transition mb-8 shadow-lg shadow-indigo-100 uppercase tracking-widest text-sm">Host as Teacher</button>
                        
                        <div className="relative mb-8 text-slate-300 uppercase text-[10px] font-black tracking-[0.3em] flex items-center gap-4">
                            <div className="h-px bg-slate-100 flex-grow"></div> STUDENT JOIN <div className="h-px bg-slate-100 flex-grow"></div>
                        </div>

                        <form onSubmit={joinRoom} className="space-y-4">
                            <input name="code" type="text" placeholder="4-Digit Code" className={`w-full p-4 border rounded-2xl text-center text-3xl font-black tracking-[0.2em] focus:ring-2 outline-none tabular-nums transition-all ${error ? 'border-red-500 ring-red-100 ring-4' : 'border-slate-200 focus:ring-emerald-500'}`} required maxLength="4" />
                            {error && <p className="text-red-500 text-xs font-bold animate-pulse">{error}</p>}
                            <button className="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold hover:bg-emerald-600 shadow-lg shadow-emerald-100 uppercase tracking-widest text-sm">Join Room</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'student') return (
                <div className="flex items-center justify-center min-h-screen bg-emerald-50 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                        
                        <button onClick={() => { setView('landing'); setRoomCode(''); }} className="mb-6 text-slate-400 hover:text-slate-600 flex items-center gap-1 text-xs font-bold transition-colors">
                             ← Back to Menu
                        </button>

                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Room Code</h2>
                        <p className="text-6xl font-black text-emerald-600 mb-8 tracking-tighter tabular-nums">{roomCode}</p>
                        
                        <form onSubmit={submitAge} className="space-y-8">
                            <div>
                                <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest">Select Your Birthday</label>
                                <input
                                  name="bday"
                                  type="date"
                                  max={getTodayStr()}
                                  className="w-full min-w-0 block px-4 py-4 border-2 border-slate-100 rounded-2xl text-base sm:text-lg outline-emerald-500 bg-slate-50 font-medium cursor-pointer"
                                  style={{ boxSizing: 'border-box' }}
                                  required
                                />
                            </div>
                            <button className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-100 text-sm uppercase tracking-widest hover:bg-emerald-700 transition-all">Submit My Age</button>
                        </form>
                    </div>
                </div>
            );

            // --- TEACHER VIEW ---
            return (
                <div className="p-8 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="text-center md:text-left">
                            <button onClick={endSession} className="text-slate-400 hover:text-slate-600 font-bold text-xs uppercase tracking-widest mb-4 inline-block">
                              ← End Session
                            </button>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-2 leading-none">Classroom Room Code</p>
                            <h1 className="text-9xl font-black text-indigo-600 tracking-tighter tabular-nums leading-none">{roomCode}</h1>
                        </div>
                        <div className="bg-white px-10 py-6 rounded-[2rem] border shadow-sm text-center min-w-[180px]">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Submissions</p>
                            <p className="text-5xl font-black text-slate-800 tabular-nums leading-none">{population.length}</p>
                        </div>
                    </header>

                    {/* BIG AVERAGES */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                        <div className="bg-indigo-600 p-10 rounded-[3rem] shadow-2xl text-white relative overflow-hidden group">
                            <div className="absolute top-0 right-0 p-8 opacity-10 scale-150 transition-transform group-hover:scale-[1.7]">
                                <svg width="100" height="100" fill="currentColor" viewBox="0 0 16 16"><path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1zm-7.978-1L7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4m3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0M6.936 9.28a6 6 0 0 0-1.23-.247A7 7 0 0 0 5 9c-4 0-5 3-5 4q0 1 1 1h4.216A2.24 2.24 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816M4.5 7a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5m2.44-2.546a3.5 3.5 0 1 1-4.88 0 3.5 3.5 0 0 1 4.88 0"/></svg>
                            </div>
                            <p className="text-xs font-black uppercase opacity-60 mb-2 tracking-[0.3em] relative z-10">Population Average</p>
                            <p className="text-8xl md:text-9xl font-black italic tracking-tighter tabular-nums relative z-10">{popAvg}</p>
                        </div>
                        <div className="bg-emerald-500 p-10 rounded-[3rem] shadow-2xl text-white relative overflow-hidden group">
                             <div className="absolute top-0 right-0 p-8 opacity-10 scale-150 transition-transform group-hover:scale-[1.7]">
                                <svg width="100" height="100" fill="currentColor" viewBox="0 0 16 16"><path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"/></svg>
                            </div>
                            <p className="text-xs font-black uppercase opacity-60 mb-2 tracking-[0.3em] relative z-10">Sample Average</p>
                            <p className="text-8xl md:text-9xl font-black italic tracking-tighter tabular-nums relative z-10">{sampleAvg}</p>
                        </div>
                    </div>

                    {/* RANDOM SAMPLER CONTROL */}
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-10 flex flex-col md:flex-row items-center gap-10">
                        <div className="flex-grow w-full">
                            <div className="flex justify-between mb-4 items-end">
                                <label className="text-sm font-black text-slate-800 uppercase tracking-tight">Draw Sample Size: <span className="text-indigo-600 text-4xl ml-2 tabular-nums">{drawSize}</span></label>
                                <label className="text-xs font-bold text-slate-300 uppercase tabular-nums tracking-widest">Available: {availableCount}</label>
                            </div>
                            <input 
                                type="range" min="1" max={Math.max(1, population.length)} value={drawSize}
                                onChange={(e) => setDrawSize(parseInt(e.target.value))}
                                className="w-full h-4 bg-slate-100 rounded-full appearance-none cursor-pointer accent-indigo-600 transition-all hover:bg-slate-200"
                            />
                        </div>
                        <button 
                            onClick={drawRandomSamples}
                            disabled={availableCount === 0 || population.length === 0}
                            className="bg-indigo-600 text-white px-12 py-6 rounded-[1.5rem] font-black whitespace-nowrap hover:bg-indigo-700 disabled:opacity-10 disabled:grayscale transition-all shadow-xl shadow-indigo-100 uppercase tracking-widest text-sm active:scale-95"
                        >
                            Draw Random
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        {/* BOX 1: POPULATION */}
                        <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                            <h2 className="text-xs font-black text-slate-400 uppercase mb-8 tracking-[0.3em]">Population List (N={population.length})</h2>
                            <div className="h-[450px] overflow-y-auto p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                                <div className="flex flex-wrap gap-3">
                                    {population.length === 0 && <div className="flex flex-col items-center justify-center w-full h-full text-slate-300 gap-4"><div className="w-12 h-12 border-4 border-t-indigo-200 border-slate-100 rounded-full animate-spin"></div><p className="italic text-sm font-medium tracking-tight">Listening for entries...</p></div>}
                                    {population.map(p => {
                                        const isSelected = sampleIds.includes(p.id);
                                        return (
                                            <button key={p.id} disabled={isSelected}
                                                onClick={() => setSampleIds([...sampleIds, p.id])}
                                                className={`px-5 py-3 rounded-2xl font-black text-sm transition-all tabular-nums
                                                    ${isSelected 
                                                        ? 'bg-slate-200 text-slate-400 cursor-not-allowed border-transparent' 
                                                        : 'bg-white border-2 border-slate-100 text-indigo-600 hover:border-indigo-600 hover:scale-110 active:scale-90 shadow-sm'
                                                    }`}
                                            >
                                                {p.age.toFixed(2)}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* BOX 2: SAMPLE */}
                        <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Active Sample (n={sampleData.length})</h2>
                                <button onClick={() => setSampleIds([])} className="text-[10px] font-black text-red-400 hover:text-red-600 uppercase border-b-2 border-red-50 transition-colors">Clear Dataset</button>
                            </div>
                            <div className="h-[450px] overflow-y-auto p-6 bg-emerald-50/40 rounded-[2rem] border-2 border-dashed border-emerald-100">
                                <div className="flex flex-wrap gap-3">
                                    {sampleData.length === 0 && <p className="text-emerald-200 italic text-sm p-4 w-full text-center font-medium">No items sampled yet.</p>}
                                    {sampleData.map(p => (
                                        <button key={p.id} onClick={() => setSampleIds(sampleIds.filter(id => id !== p.id))}
                                            className="bg-emerald-500 text-white px-5 py-3 rounded-2xl font-black text-sm shadow-md hover:bg-red-500 transition-all flex items-center group tabular-nums"
                                        >
                                            {p.age.toFixed(2)}
                                            <span className="ml-2 text-[10px] opacity-30 group-hover:opacity-100">✕</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
